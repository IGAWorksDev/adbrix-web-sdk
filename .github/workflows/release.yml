name: Publish Web SDK Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Resolve npm dist-tag
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "v$PACKAGE_VERSION" != "$GITHUB_REF_NAME" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION" >&2
            exit 1
          fi
          if [[ "$PACKAGE_VERSION" == *"-beta."* ]]; then
            echo "NPM_DIST_TAG=beta" >> "$GITHUB_ENV"
          elif [[ "$PACKAGE_VERSION" == *"-rc."* ]]; then
            echo "NPM_DIST_TAG=rc" >> "$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Publish to npm
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --json >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; skipping npm publish."
            exit 0
          fi
          npm publish --access public --tag "$NPM_DIST_TAG"
